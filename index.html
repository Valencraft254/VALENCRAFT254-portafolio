<section id="professional-contact-form">
  <h2>Professional Contact Form</h2>
  <form action="https://formspree.io/f/{your_endpoint}" method="POST">
    <label for="subject">Subject:</label>
    <input type="text" id="subject" name="subject" required>

    <label for="server">Server Selection:</label>
    <select id="server" name="server" required>
      <option value="Server1">Server1</option>
      <option value="Server2">Server2</option>
      <option value="Server3">Server3</option>
    </select>

    <label for="message">Message:</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Send</button>
  </form>
</section>
